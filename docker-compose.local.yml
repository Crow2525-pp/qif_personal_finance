services:
  grafana:
    # Match the main compose Grafana image/version when running the local override.
    image: grafana/grafana:12.2.0-ubuntu
    environment:
      # Install DuckDB plugin from external URL (GF_INSTALL_PLUGINS supports url;plugin-id format)
      - GF_INSTALL_PLUGINS=https://github.com/motherduckdb/grafana-duckdb-datasource/releases/download/v0.4.0/motherduck-duckdb-datasource-0.4.0.zip;motherduck-duckdb-datasource
      # Allow unsigned plugin to load
      - GF_PLUGINS_ALLOW_LOADING_UNSIGNED_PLUGINS=motherduck-duckdb-datasource
    volumes:
      - ./data_projects/qif_personal_finance/pipeline_personal_finance/dbt_finance/duckdb:/var/lib/grafana/duckdb
      - ./platform/grafana/provisioning:/etc/grafana/provisioning

  pipeline_personal_finance:
    volumes:
      - ./scripts:${DAGSTER_APP}/scripts:ro
      - ./platform/dagster_core/dagster.yaml:/docker/appdata/dagster/dagster_home/dagster.yaml:ro

  dagster_webserver:
    ports:
      - "${DAGSTER_UI_BIND_HOST:-127.0.0.1}:${DAGSTER_UI_PORT:-3002}:3000"
    volumes:
      - ./platform/dagster_core/dagster.yaml:/docker/appdata/dagster/dagster_home/dagster.yaml:ro

  dagster_daemon:
    volumes:
      - ./platform/dagster_core/dagster.yaml:/docker/appdata/dagster/dagster_home/dagster.yaml:ro

  dagster_postgres:
    # Expose postgres to the host for debugging. Worktree env decides the host port.
    ports:
      - "${POSTGRES_BIND_HOST:-127.0.0.1}:${POSTGRES_HOST_PORT:-5433}:5432"
